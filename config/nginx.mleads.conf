server {
    listen 443 ssl http2;
    server_name mleads.example.com;

    ssl_certificate /etc/letsencrypt/live/mleads.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mleads.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:43123;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /stripe/webhook {
        proxy_pass http://127.0.0.1:43124/stripe/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
